syntax = "proto3";

package ledger;

option java_package = "com.ledger.clone.common.proto";
option java_multiple_files = true;

enum TransactionType {
  DEPOSIT = 0;
  WITHDRAWAL = 1;
  TRANSFER = 2;
}

message TransactionRequest {
  string request_id = 1;
  TransactionType type = 2;
  string from_user_id = 3;
  string to_user_id = 4;
  string asset = 5;
  string amount = 6;
}

message TransactionResponse {
  string request_id = 1;
  string tx_id = 2;
  bool success = 3;
  string error_message = 4;
  string new_balance = 5;
  int64 raft_log_index = 6;
}

message BalanceQuery {
  string user_id = 1;
  string asset = 2;
}

message BalanceResponse {
  string user_id = 1;
  string asset = 2;
  string balance = 3;
}

service LedgerService {
  rpc Deposit(TransactionRequest) returns (TransactionResponse);
  rpc Withdraw(TransactionRequest) returns (TransactionResponse);
  rpc Transfer(TransactionRequest) returns (TransactionResponse);
  rpc GetBalance(BalanceQuery) returns (BalanceResponse);
}
